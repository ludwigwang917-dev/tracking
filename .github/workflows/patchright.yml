name: CMA/MSC 查询 (patchright v2)

on:
  workflow_dispatch:
    inputs:
      carrier:
        description: '船司'
        required: true
        type: choice
        options: [CMA, MSC, BOTH]
      bl_number:
        description: 'B/L 号'
        required: true

jobs:
  query:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - run: |
          pip install patchright
          npx playwright install-deps chromium 2>/dev/null || true
          python -m patchright install chromium --with-deps

      - run: |
          python query_patchright_ci.py "${{ github.event.inputs.carrier }}" "${{ github.event.inputs.bl_number }}"
      
      - name: Dump Results
        if: always()
        run: |
          for f in evidence/*_result.txt; do
            [ -f "$f" ] && echo "=== $f ===" && cat "$f" || true
          done
          for f in evidence/*_structure.json; do
            [ -f "$f" ] && echo "=== $f ===" && cat "$f" || true
          done
          echo "=== LS ===" && ls -la evidence/ 2>/dev/null || echo "(no evidence dir)"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results
          path: evidence/
          retention-days: 3
