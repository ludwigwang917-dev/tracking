name: 船司查询 CMA/MSC

on:
  workflow_dispatch:
    inputs:
      cma_bl:
        description: 'CMA B/L Number'
        required: false
        default: 'ABQ0117757'
      msc_bl:
        description: 'MSC B/L Number'
        required: false
        default: 'MEDUH7002122'
      carrier:
        description: '查询哪个船司'
        required: true
        type: choice
        options:
          - CMA
          - MSC
          - BOTH

jobs:
  query:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Query CMA
        if: ${{ github.event.inputs.carrier == 'CMA' || github.event.inputs.carrier == 'BOTH' }}
        run: |
          python query_cma_msc_ci.py CMA "${{ github.event.inputs.cma_bl }}"

      - name: Query MSC
        if: ${{ github.event.inputs.carrier == 'MSC' || github.event.inputs.carrier == 'BOTH' }}
        run: |
          python query_cma_msc_ci.py MSC "${{ github.event.inputs.msc_bl }}"

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: query-results
          path: |
            evidence/*.png
            evidence/*.txt
          retention-days: 7
