name: 船司查询 CMA/MSC

on:
  workflow_dispatch:
    inputs:
      bl_number:
        description: 'B/L Number'
        required: true
        default: 'ABQ0117757'
      carrier:
        description: '船司'
        required: true
        type: choice
        options:
          - CMA
          - MSC
          - BOTH

jobs:
  cma:
    if: ${{ github.event.inputs.carrier == 'CMA' || github.event.inputs.carrier == 'BOTH' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install playwright && python -m playwright install chromium --with-deps
      - run: python query_cma_msc_ci.py CMA "${{ github.event.inputs.bl_number }}"
      - name: Dump Results
        if: always()
        run: |
          echo "=== CMA RESULT ==="
          cat evidence/cma_result.txt 2>/dev/null || echo "(no result file)"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cma-results
          path: evidence/
          retention-days: 7

  msc:
    if: ${{ github.event.inputs.carrier == 'MSC' || github.event.inputs.carrier == 'BOTH' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install playwright && python -m playwright install chromium --with-deps
      - run: python query_cma_msc_ci.py MSC "${{ github.event.inputs.bl_number }}"
      - name: Dump Results
        if: always()
        run: |
          echo "=== MSC RESULT ==="
          cat evidence/msc_result.txt 2>/dev/null || echo "(no result file)"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: msc-results
          path: evidence/
          retention-days: 7
